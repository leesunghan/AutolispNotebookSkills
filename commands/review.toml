description = "5개 축 기준의 코드 리뷰 수행 — 올바름, 가독성, 아키텍처, 보안/안전, 성능"

prompt = """
code-review-and-quality 스킬을 호출합니다.

다음 5가지 축을 기준으로 현재 AutoLISP / DCL 변경 사항(또는 최근에 수정된 노트북 셀)을 리뷰하십시오:

1. **올바름(Correctness)** — 예상되는 도면 객체를 올바르게 생성합니까? 기하학적 예외 상황(예: 0으로 나누기, 일치하는 점, 빈 선택 세트)을 적절히 처리했습니까? CAD DB 어설션이 충분히 작성되었습니까?
2. **가독성(Readability)** — 마크다운 설명 셀과 progn으로 래핑된 AutoLISP 코드 셀이 엄격하게 번갈아 나타납니까? 변수 이름이 명확하고 LISP 들여쓰기가 표준 규칙을 따릅니까?
3. **아키텍처(Architecture)** — 로직의 역할 분담이 명확합니까? Undo 경계(`vla-StartUndoMark`/`vla-EndUndoMark`)가 누락 없이 올바르게 관리됩니까?
4. **보안 및 안전(Security & Safety)** — CAD 시스템 변수(OSMODE, CMDECHO 등)가 정상적으로 캐싱되고 복원됩니까? 실행 오류가 발생하더라도 CAD 환경을 안정된 상태로 되돌리기 위한 로컬 `*error*` 핸들러가 구성되어 있습니까?
5. **성능(Performance)** — 선택 세트(`ssget`) 쿼리 시 DXF 필터를 적극적으로 활용하고 있습니까? 대량 생성 루프에서 콘솔 명령 파이프라인 대신 ActiveX (`vla-Add...`) 함수로 최적화되었습니까? 작업이 완료된 후 사용한 변수를 정리했습니까?

발견된 이슈는 Critical, Important, Suggestion 단계로 분류하여 출력하십시오.
각 이슈는 특정 파일의 라인 번호 또는 노트북 셀 인덱스를 명시하고 구체적인 해결 제안을 덧붙인 구조화된 형태로 작성해야 합니다.
"""