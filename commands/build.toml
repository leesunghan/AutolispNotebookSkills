description = "AutoLISP 노트북 셀을 점진적으로 구현 — 빌드, 테스트, 검증, 커밋. 승인된 하나의 단계에서 전체 계획을 실행하려면 \"auto\"를 추가하십시오."

prompt = """
test-driven-development 스킬과 함께 incremental-implementation 스킬을 호출합니다.

## 모드(Modes)

- `/build` — 보류 중인 다음 셀이나 작업을 구현하고 멈춥니다 (주의: 한 번에 한 단계씩 진행).
- `/build auto` — 필요한 경우 계획을 생성하고, 한 번 승인을 받은 다음, 도중에 멈추지 않고 모든 작업/셀을 자동으로 구현합니다.

인수(argument)를 사용하여 모드를 선택합니다. `auto`(권장) 또는 `all`은 자율(autonomous) 모드로 처리하며, 그 외의 다른 인수(또는 빈값)는 기본 단일 작업 모드로 작동합니다. 참고: 자율 모드가 개별 작업 처리 속도 자체를 단축하지는 않으며 동일한 테스트 기반 루프를 수행하지만, 작업 간의 수동 승인 단계를 생략합니다.

## 기본 모드: 단일 작업 진행

계획에서 다음 보류 중인 작업(일반적으로 노트북 셀 추가 또는 수정)을 선택합니다. 그 후 다음 단계를 진행하십시오:

1. 작업의 인수 조건(예상되는 CAD 레이어, 도면 형상, DCL 상태 등)을 확인합니다.
2. 관련 컨텍스트(기존 AutoLISP 유틸리티, 시스템 변수, ActiveX 인터페이스 등)를 로드합니다.
3. 예상되는 상태를 검사하는 실패하는 CAD 데이터베이스 어설션 셀을 작성합니다 (RED 단계).
4. 해당 어설션을 통과하도록 직전 셀에 최소한의 AutoLISP 코드(로컬 변수를 선언하고 국가별 명령 접두사 `._`를 포함하며, `progn`으로 래핑)를 구현합니다 (GREEN 단계).
5. BricsCAD/AutoCAD 내에서 어설션 셀을 실행(또는 시뮬레이션/스텁 처리)하여 통과하는지 확인합니다.
6. `.lspnb` 노트북 파일이 올바른 JSON 구조로 유지되고 구문 오류 없이 로드되는지 확인합니다.
7. 변경 사항에 대한 구체적인 커밋 메시지와 함께 깃 커밋을 수행합니다.
8. 작업을 완료로 표시하고 작업을 종료합니다.

## 자율 모드: 전체 계획 자동 진행 (`/build auto`)

명세서(projects/<프로젝트명>/SPEC.md)가 존재하고 계획과 빌드를 단일 실행으로 처리하려는 경우 이 모드를 사용합니다. 작업 간의 수동 승인 단계를 생략할 뿐 검증 과정 자체는 유지됩니다. 모든 작업은 여전히 개별 통과하는 CAD 데이터베이스 어설션과 고유 커밋을 포함해야 합니다.

1. 명세서를 필수 요구사항으로 설정합니다. 해당 프로젝트 경로 `projects/<프로젝트명>/SPEC.md` 파일만 탐색하십시오. 명세서가 존재하지 않으면 빌드를 즉시 중단하고 사용자에게 /spec을 먼저 실행하도록 안내하십시오.
2. 깨끗한 기준점을 유지합니다. `git status --porcelain`을 실행합니다. 만약 계획 관련 산출물(`projects/<프로젝트명>/SPEC.md`, `projects/<프로젝트명>/plan.md`, `projects/<프로젝트명>/todo.md`)을 제외한 다른 위치에 커밋되지 않은 로컬 변경 사항이 존재하는 경우, 실행을 중단하고 사용자에게 커밋, 스태시(stash) 또는 승인 여부를 문의하십시오.
3. 필요한 경우 계획을 생성합니다. 만약 `projects/<프로젝트명>/plan.md`가 존재하지 않는다면 planning-and-task-breakdown 스킬을 실행하여 생성합니다.
4. 단일 체크포인트 승인 단계. 전체 계획을 사용자에게 출력하고 확실한 긍정 답변(예: "approve", "go", "yes")을 대기합니다. 모호한 답변은 불승인으로 간주합니다.
5. 의존성 순서에 따라 모든 작업을 차례대로 실행합니다. 각 작업에 대해 위의 기본 단일 작업 루프(RED → GREEN → CAD DB 어설션 검증 → JSON 검증 → 커밋 → 완료 표시)를 반복 수행합니다. 해당 작업이 직접 수정한 파일 및 태스크 상태 업데이트 파일만 스테이징 영역에 추가하며, `git add -A`를 무분별하게 실행해서는 안 됩니다.
6. 다음과 같은 상황이 발생하면 즉시 실행을 멈추고 사용자에게 조치를 요청하십시오:
   - CAD 데이터베이스 어설션을 통과할 수 없거나 BricsCAD/AutoCAD에서 예외가 발생하는 경우 → debugging-and-error-recovery 스킬을 따릅니다.
   - 명세서가 모호하거나 명세서에 명시되지 않은 결정 사항에 직면한 경우.
   - 작업이 고위험군(기본 템플릿 수정, 도면 데이터베이스 삭제, 외부 안전하지 않은 호출 등)에 속하는 경우 → doubt-driven-development 스킬을 따르고 명시적인 승인을 얻습니다.
7. 종료 후 요약 리포트를 출력합니다: 완료된 작업 수, 추가된 CAD 어설션 수, 수행된 커밋 및 생략된 작업 목록.

어느 단계에서든 실패할 경우, debugging-and-error-recovery 스킬을 수행하십시오.
"""
