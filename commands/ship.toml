description = "전문가 페르소나들로 구성된 병렬 팬아웃(fan-out)을 통해 배포 전 체크리스트를 실행하고 배포 여부(go/no-go) 의사결정을 종합"

prompt = """
shipping-and-launch 스킬을 호출합니다.

`/ship`은 **팬아웃 오케스트레이터**입니다. 현재 AutoLISP/DCL 변경 사항에 대해 병렬로 3가지 전문가 페르소나를 실행한 다음, 이들의 보고서를 하나로 묶어 배포 여부(go/no-go) 의사결정 및 롤백 계획을 도출합니다.

## Phase A — 병렬 팬아웃 (Parallel fan-out)

3개의 하위 에이전트를 동시에 생성합니다. CLI는 `agents/` 디렉토리 내의 각 사용자 지정 페르소나를 동일한 이름의 도구로 노출하므로, `code-reviewer.md`는 메인 에이전트가 호출할 수 있는 `code-reviewer` 도구가 되며 프롬프트 상에서 `@code-reviewer` 형식으로 직접 부를 수도 있습니다. **병렬로 실행되도록 단일 어시스턴트 턴 안에서 3개의 하위 에이전트 툴 호출을 동시에 발행하십시오.** 순차적으로 호출할 경우 이 명령의 주된 이점이 상실됩니다.

각 페르소나를 툴 이름으로 실행하십시오:

1. **`code-reviewer`** — AutoLISP 및 DCL 변경 사항에 대해 5가지 기준(올바름, 가독성, 아키텍처, 안전성, 성능)을 가진 코드 리뷰를 수행합니다. 표준 코드 리뷰 템플릿 형태로 결과를 출력합니다.
2. **`security-auditor`** — CAD 안전성 감사를 실행합니다. 무한 루프, 닫히지 않은 실행 취소(Undo) 마크, 처리되지 않은 시스템 변수 변경 사항 등을 검사하고 표준 안전성 보고서를 작성합니다.
3. **`test-engineer`** — 변경 사항에 대한 CAD DB 어설션 테스트 커버리지를 분석합니다. 해피 패스(happy path), 기하학적 예외 케이스, 상태 복원 등의 누락 사항을 식별하고 표준 커버리지 분석 보고서를 발행합니다.

현재 CLI 버전에서 하위 에이전트를 활용할 수 없는 상황이라면, 메인 컨텍스트 내에서 각 페르소나의 시스템 프롬프트를 순차적으로 호출한 후 이들이 병렬로 실행된 것처럼 결과를 취합하여 병합 단계를 수행하십시오.

## Phase B — 메인 컨텍스트 내 병합 (Merge in main context)

3가지 보고서가 모두 수집되면, 메인 에이전트가 이들을 하나로 종합합니다:

1. **코드 품질(Code Quality)** — `code-reviewer` 결과의 Critical/Important 발견 사항들과 실패한 CAD 어설션, 린트 오류, 구문 오류 등을 수집합니다.
2. **안전성(Safety)** — `security-auditor`가 지적한 임계/높음(Critical/High) 상태의 위험 요인(예: 네임스페이스 오염, 무한 루프 가능성 등)을 배포 불허(launch blockers) 이슈로 지정합니다.
3. **성능(Performance)** — `code-reviewer` 결과의 성능 항목을 추출하고, ActiveX 활용 상태, REGEN 호출 빈도 및 루프 복잡도를 상호 검증합니다.
4. **도면 표준 및 DCL 접근성(Drawing Standards & DCL Accessibility)** — CAD 레이어 네이밍 규정 준수 여부, 색상 대비 상태(배경색에 묻히는 색상 배제), DCL 대화상자 단축키 및 키보드 포커스 제어 상태를 검증합니다 (접근성 체크리스트 활용).
5. **CAD 환경 설정(CAD Environment Settings)** — 시스템 변수(OSMODE, CMDECHO)의 원래 상태가 유지되는지 확인하고 ActiveX 객체가 모두 해제되었는지 검사합니다.
6. **문서화(Documentation)** — 설명용 마크다운 셀이 최신 정보로 유지되고 코드 셀과 교대로 올바르게 번갈아 배치되었는지 확인합니다.

## Phase C — 의사결정 및 롤백 계획 (Decision and rollback)

최종 배포 결정을 다음과 같이 단일 리포트 형태로 작성합니다:

```markdown
## 배포 여부 결정: GO | NO-GO

### 차단 요소 (배포 전 반드시 해결해야 할 이슈)
- [출처 페르소나: 임계 발견 사항 + 파일:라인 또는 셀 인덱스]

### 권장 개선 사항 (배포 전 수정할 것을 권장)
- [출처 페르소나: 중요 발견 사항 + 파일:라인 또는 셀 인덱스]

### 인지된 위험 요인 (그럼에도 배포 진행 시 감수할 위험)
- [위험 요인 + 완화 조치]

### 롤백 계획 (Rollback plan)
- 실행 조건: [CAD 실행 환경에서 어떤 문제가 발견되었을 때 롤백을 실행할지 명시]
- 롤백 절차: [도면 데이터베이스 및 CAD 환경 상태를 이전 상태로 완전히 되돌리기 위한 세부 조치]
- 목표 복구 시간(RTO): [목표치]

### 전문가 개별 리포트 요약
- [code-reviewer 리포트]
- [security-auditor 리포트]
- [test-engineer 리포트]
```

## 규칙 (Rules)

1. Phase A의 3가지 페르소나는 병렬로 실행해야 하며 순차적으로 실행하지 마십시오.
2. 각 페르소나는 서로를 직접 호출하지 않으며, 최종 병합 작업은 메인 에이전트가 Phase B에서 단독으로 수행합니다.
3. 배포 여부를 GO로 결정할 때는 반드시 롤백 계획을 함께 제공해야 합니다.
4. 한 페르소나에서라도 Critical 판정이 나오면 기본 Verdict는 NO-GO여야 하며, 사용자가 특별히 해당 위험을 용인하고 서명한 경우에만 예외를 둘 수 있습니다.
5. **다음 조건이 모두 충족될 때만 병렬 팬아웃을 생략할 수 있습니다:** 변경된 파일이 2개 이하이고, 코드 수정량이 50라인 미만이며, 주요 시스템 변수나 DCL 레이아웃의 직접 수정을 수반하지 않는 경우. 그 외의 경우에는 항상 병렬 리뷰 팬아웃을 실행하십시오.
"""