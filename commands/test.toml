description = "AutoLISP TDD 워크플로우 실행 — 실패하는 CAD 데이터베이스 어설션 작성, 구현, 검증. 버그는 CAD Prove-It 패턴을 사용하십시오."

prompt = """
test-driven-development 스킬을 호출합니다.

새로운 기능 개발 시:
1. 레이어, 객체 또는 좌표 정보를 확인하는 실패하는 CAD 데이터베이스 어설션 셀을 작성합니다 (RED 단계).
2. 이를 통과할 수 있도록 최소한의 AutoLISP 제도 로직을 작성합니다 (GREEN 단계).
3. 어설션을 통과하는 상태를 유지하면서 LISP 구조(변수 지역화, ActiveX 활용)를 개선합니다 (REFACTOR 단계).

버그 수정 시 (CAD Prove-It 패턴):
1. 해당 버그를 재현할 수 있는 실패하는 CAD 데이터베이스 어설션 셀을 작성합니다 (버그의 존재 증명, RED 단계).
2. CAD 편집기에서 해당 어설션이 실패하는지 확인합니다.
3. 이를 해결하는 AutoLISP 수정 코드를 구현합니다.
4. 어설션이 정상 통과(GREEN 단계)하는지 확인합니다.
5. 다른 노트북 검증 셀들을 실행하여 변경 사항으로 인한 회귀(regression) 버그가 없는지 확인합니다.
"""