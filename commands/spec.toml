description = "명세 기반 개발 시작 — AutoLISP/DCL 자동화를 위한 구조화된 명세서 작성"

prompt = """
spec-driven-development 스킬을 호출합니다.

먼저 CAD 자동화 요구사항을 파악하는 것부터 시작합니다. 다음 사항에 대해 명확히 하기 위해 질문하십시오:
1. 작업을 저장할 프로젝트 폴더명 (예: draw-walls, door-automation 등, 반드시 projects/ 하위 디렉터리로 지정)
2. 대상 CAD 플랫폼(AutoCAD, BricsCAD 또는 둘 다) 및 API 제한 사항
3. 핵심 기능 및 제도/자동화 요구사항
4. 레이어 네이밍, 색상 색인(ACI), 선가중치 및 선종류 표준
5. 사용자 인터페이스 요구사항 (DCL 대화상자, 명령행 프롬프트, 옵션)
6. 핵심 시스템 변수(OSMODE/OSNAP, CMDECHO, NOMUTT, ANGBASE 등)와 예상 상태
7. 실행 취소(Undo) 경계 및 오류 처리 요구사항

그 다음, 다음과 같은 내용을 포함하는 구조화된 명세서(SPEC.md)를 생성합니다:
- **목적 및 범위(Objective & Scope)**: 대상 플랫폼 및 목적
- **CAD 환경 표준(CAD Environment Standards)**: 레이어 테이블 구성, 색상 지정, 시스템 변수 기준값
- **DCL 레이아웃 및 입력(DCL Layout & Inputs)** (해당하는 경우): 컨트롤, 타일, 단축키(mnemonic), 기본 동작
- **AutoLISP 구조(AutoLISP Structure)**: 진입점, 헬퍼 함수, 로컬 변수 범위 지정 규칙
- **테스트 및 검증 전략(Testing & Verification Strategy)**: CAD DB 어설션, 예상 객체 유형, 경계 조건 검사
- **안전 경계(Safety Boundaries)**: 복원해야 할 시스템 변수, 실행 취소 경계, 메모리 관리

지정한 프로젝트 폴더(projects/<프로젝트명>/SPEC.md)에 명세서를 저장하고 진행하기 전에 사용자에게 확인을 받으십시오.
"""